<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Chá de Casa Nova</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
    .container { max-width: 1200px; margin: auto; }
    h1, h2 { color: #333; margin-bottom: 10px; }
    .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 400px; margin: 100px auto; }
    .login-box h1 { text-align: center; margin-bottom: 20px; }
    .login-box input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
    .login-box button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    .login-box button:hover { background: #0056b3; }
    .dashboard { display: none; }
    .metricas { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; }
    .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex: 1; min-width: 200px; text-align: center; }
    .card h3 { margin-bottom: 10px; color: #555; }
    .card p { font-size: 24px; font-weight: bold; color: #007bff; }
    .btn { padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
    .btn:hover { background: #0056b3; }
    .btn-danger { background: #dc3545; }
    .btn-danger:hover { background: #a71d2a; }
    .btn-secondary { background: #6c757d; }
    .btn-secondary:hover { background: #5a6268; }
    .section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 30px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #f8f9fa; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background: rgba(0,0,0,0.5); }
    .modal-content { background: white; margin: 10% auto; padding: 20px; border-radius: 8px; max-width: 500px; }
    .modal-content h2 { margin-bottom: 15px; }
    .modal-content input, .modal-content select, .modal-content button { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
    .modal-content button { margin-top: 5px; }
    .close { float: right; font-size: 24px; cursor: pointer; }
    .close:hover { color: red; }
    @media (max-width: 600px) {
      .metricas { flex-direction: column; }
      table { font-size: 14px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div id="loginSection" class="login-box">
    <h1>Admin - Chá de Casa Nova</h1>
    <input type="text" id="tokenInput" placeholder="Token de acesso" />
    <button onclick="login()">Entrar</button>
    <p id="loginError" style="color:red;display:none;">Token inválido</p>
  </div>

  <div id="dashboardSection" class="dashboard">
    <h1>Dashboard Administrativo</h1>
    <button class="btn" onclick="carregarDados()">Atualizar Dados</button>
    <button class="btn btn-danger" onclick="logout()" style="float:right;">Sair</button>
    <div style="clear:both;"></div>

    <div id="metricasContainer" class="metricas"></div>

    <div class="section">
      <h2>Histórico de Doações</h2>
      <table id="historicoTable">
        <thead><tr><th>ID</th><th>Nome</th><th>Email</th><th>Total</th><th>Data</th><th>Itens</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="section">
      <h2>Produtos</h2>
      <button class="btn" onclick="abrirModalAdicionar()">Adicionar Produto</button>
      <table id="produtosTable">
        <thead><tr><th>ID</th><th>Nome</th><th>Preço</th><th>Cotas Totais</th><th>Cotas Vendidas</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Modal Adicionar Produto -->
  <div id="modalAdicionar" class="modal">
    <div class="modal-content">
      <span class="close" onclick="fecharModal('modalAdicionar')">&times;</span>
      <h2>Adicionar Produto</h2>
      <input type="text" id="addNome" placeholder="Nome do produto" />
      <input type="number" step="0.01" id="addPreco" placeholder="Preço" />
      <button class="btn" onclick="adicionarProduto()">Salvar</button>
    </div>
  </div>

  <!-- Modal Editar Produto -->
  <div id="modalEditar" class="modal">
    <div class="modal-content">
      <span class="close" onclick="fecharModal('modalEditar')">&times;</span>
      <h2>Editar Produto</h2>
      <input type="hidden" id="editId" />
      <input type="text" id="editNome" placeholder="Nome do produto" />
      <input type="number" step="0.01" id="editPreco" placeholder="Preço" />
      <select id="editStatus">
        <option value="ativo">Ativo</option>
        <option value="inativo">Inativo</option>
      </select>
      <button class="btn" onclick="editarProduto()">Salvar</button>
    </div>
  </div>
</div>

<script>
  function login() {
    const token = document.getElementById('tokenInput').value.trim();
    if (token === 'Naname2026!') {
      sessionStorage.setItem('adminToken', token);
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('dashboardSection').style.display = 'block';
      document.getElementById('loginError').style.display = 'none';
      carregarDados();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  function logout() {
    sessionStorage.removeItem('adminToken');
    document.getElementById('dashboardSection').style.display = 'none';
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('tokenInput').value = '';
    document.getElementById('loginError').style.display = 'none';
  }

  function getToken() {
    return sessionStorage.getItem('adminToken');
  }

  async function fetchAPI(endpoint, options = {}) {
    const token = getToken();
    if (!token) { logout(); return null; }
    const url = `https://cha-de-casa-nova-backend.vercel.app/api/admin/${endpoint}?token=${token}`;
    try {
      const response = await fetch(url, options);
      if (!response.ok) {
        if (response.status === 401) { logout(); alert('Token inválido'); return null; }
        throw new Error('Erro na requisição');
      }
      return await response.json();
    } catch (error) {
      alert('Erro ao conectar com o servidor: ' + error.message);
      return null;
    }
  }

  function carregarDados() {
    carregarMetricas();
    carregarHistorico();
    carregarProdutos();
  }

  async function carregarMetricas() {
    const data = await fetchAPI('dashboard');
    if (!data) return;
    const container = document.getElementById('metricasContainer');
    container.innerHTML = `
      <div class="card"><h3>Total Arrecadado</h3><p>R$ ${data.total_arrecadado.toFixed(2)}</p></div>
      <div class="card"><h3>Meta</h3><p>R$ ${data.meta.toFixed(2)}</p></div>
      <div class="card"><h3>Percentual</h3><p>${data.percentual.toFixed(2)}%</p></div>
      <div class="card"><h3>Doadores</h3><p>${data.contagem_doadores}</p></div>
    `;
  }

async function carregarHistorico() {
  const data = await fetchAPI('doacoes');
  if (!data) return;
  
  // Converter objeto Firebase em array preservando IDs
  const doacoesArray = data && typeof data === 'object' 
    ? Object.entries(data).map(([id, doacao]) => ({ id, ...doacao }))
    : [];
  
  const tbody = document.querySelector('#historicoTable tbody');
  tbody.innerHTML = doacoesArray.map(d => `
    <tr>
      <td>${d.id}</td>
      <td>${d.nome}</td>
      <td>${d.email}</td>
      <td>R$ ${d.total.toFixed(2)}</td>
      <td>${new Date(d.data).toLocaleDateString('pt-BR')}</td>
      <td>${d.itens ? d.itens.length : 0}</td>
    </tr>
  `).join('');
}

async function carregarProdutos() {
  const data = await fetchAPI('produtos');
  if (!data) return;
  
  // Converter objeto Firebase em array preservando IDs
  const produtosArray = data && typeof data === 'object' 
    ? Object.entries(data).map(([id, produto]) => ({ id, ...produto }))
    : [];
  
  const tbody = document.querySelector('#produtosTable tbody');
  tbody.innerHTML = produtosArray.map(p => `
    <tr>
      <td>${p.id}</td>
      <td>${p.nome}</td>
      <td>R$ ${p.preco.toFixed(2)}</td>
      <td>${p.cotas_totais || 0}</td>
      <td>${p.cotas_vendidas || 0}</td>
      <td>${p.status || 'N/A'}</td>
      <td>
        <button class="btn-editar" onclick="abrirModalEditar('${p.id}', '${p.nome}', ${p.preco}, '${p.status}')">Editar</button>
        <button class="btn-deletar" onclick="deletarProduto('${p.id}')">Deletar</button>
      </td>
    </tr>
  `).join('');
}

  function abrirModalAdicionar() {
    document.getElementById('addNome').value = '';
    document.getElementById('addPreco').value = '';
    document.getElementById('modalAdicionar').style.display = 'block';
  }

  function abrirModalEditar(id, nome, preco, status) {
    document.getElementById('editId').value = id;
    document.getElementById('editNome').value = nome;
    document.getElementById('editPreco').value = preco;
    document.getElementById('editStatus').value = status;
    document.getElementById('modalEditar').style.display = 'block';
  }

  function fecharModal(id) {
    document.getElementById(id).style.display = 'none';
  }

  async function adicionarProduto() {
    const nome = document.getElementById('addNome').value.trim();
    const preco = parseFloat(document.getElementById('addPreco').value);
    if (!nome || isNaN(preco) || preco <= 0) {
      alert('Preencha nome e preço válidos.');
      return;
    }
    const result = await fetchAPI('produtos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome, preco })
    });
    if (result) {
      fecharModal('modalAdicionar');
      carregarProdutos();
    }
  }

  async function editarProduto() {
  const id = document.getElementById('editId').value;
  const nome = document.getElementById('editNome').value.trim();
  const preco = parseFloat(document.getElementById('editPreco').value);
  const status = document.getElementById('editStatus').value;
  
  if (!nome || isNaN(preco) || preco <= 0) {
    alert('Preencha nome e preço válidos.');
    return;
  }
  
  const token = getToken();
  const url = `https://cha-de-casa-nova-backend.vercel.app/api/admin/produtos?token=${token}`;  // ✅ URL completa
  
  try {
    const response = await fetch(url, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, nome, preco, status })  // ✅ id NO BODY
    });
    
    if (!response.ok) throw new Error('Erro ao editar');
    fecharModal('modalEditar');
    carregarProdutos();
  } catch (error) {
    alert('Erro ao editar produto: ' + error.message);
  }
}

async function deletarProduto(id) {
  if (!confirm('Tem certeza que deseja deletar este produto?')) return;
  
  const token = getToken();
  const url = `https://cha-de-casa-nova-backend.vercel.app/api/admin/produtos?token=${token}`;  // ✅ URL completa
  
  try {
    const response = await fetch(url, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id })  // ✅ id NO BODY
    });
    
    if (!response.ok) throw new Error('Erro ao deletar');
    carregarProdutos();
  } catch (error) {
    alert('Erro ao deletar produto: ' + error.message);
  }
}

  // Verifica se já está logado ao carregar a página
  window.onload = function() {
    const token = getToken();
    if (token) {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('dashboardSection').style.display = 'block';
      carregarDados();
    }
  };
</script>
</body>
</html>
