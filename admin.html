<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin - Cha de Casa Nova</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:#f5f5f5;color:#333}body.nao-autenticado{display:flex;align-items:center;justify-content:center;min-height:100vh}body.autenticado{display:block}.login-container{background:#fff;padding:40px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.1);max-width:400px;width:100%}.login-container h1{color:#4a148c;margin-bottom:24px;text-align:center;font-size:1.8em}.form-grupo{margin-bottom:16px}.form-grupo label{display:block;font-weight:bold;margin-bottom:6px;color:#555}.form-grupo input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:1em}.login-container button{width:100%;padding:12px;background:#4a148c;color:#fff;border:none;border-radius:8px;font-weight:bold;font-size:1.1em;cursor:pointer;margin-top:16px}.login-container button:hover{background:#3a0e7a}.header{background:#4a148c;color:#fff;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}.header h1{margin:0;font-size:1.5em}.container{max-width:1200px;margin:20px auto;padding:0 16px}.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:30px}.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}.card h3{color:#4a148c;margin-bottom:12px;font-size:1.1em}.card .valor{font-size:1.8em;font-weight:bold;color:#2e7d32;margin:8px 0}.card .meta{font-size:0.9em;color:#888;margin-top:8px}.progress-bar{width:100%;height:20px;background:#eee;border-radius:10px;overflow:hidden;margin-top:12px}.progress-bar .fill{height:100%;background:linear-gradient(90deg,#4a148c,#7b1fa2);transition:width 0.3s}.section{background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.05);margin-bottom:30px}.section h2{color:#4a148c;margin-bottom:16px;border-bottom:2px solid #f3e5f5;padding-bottom:10px}.btn-group{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}.btn{padding:10px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:500;transition:0.2s}.btn-primary{background:#4a148c;color:#fff}.btn-primary:hover{background:#3a0e7a}.btn-secundario{background:#f3e5f5;color:#4a148c}.btn-secundario:hover{background:#e1bee7}.btn-danger{background:#b71c1c;color:#fff}.btn-danger:hover{background:#a01818}.btn-logout{margin-left:auto;background:#666;color:#fff;padding:8px 12px;font-size:0.9em}.table{width:100%;border-collapse:collapse;font-size:0.95em}.table th{background:#f5f5f5;padding:12px;text-align:left;font-weight:bold;color:#333;border-bottom:2px solid #ddd}.table td{padding:12px;border-bottom:1px solid #eee}.table tr:hover{background:#f9f9f9}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;z-index:999}.modal.ativo{display:flex}.modal-caixa{background:#fff;padding:30px;border-radius:12px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}.modal-caixa h3{color:#4a148c;margin-bottom:20px}.modal-caixa .form-grupo{margin-bottom:14px}.modal-caixa button{margin-right:8px;margin-top:16px}@media(max-width:768px){.dashboard{grid-template-columns:1fr}.table{font-size:0.85em}.modal-caixa{max-width:100%}}</style></head><body class="nao-autenticado"><div id="login" class="login-container"><h1>Admin</h1><h3 style="text-align:center;color:#666;margin-bottom:20px">Cha de Casa Nova</h3><div class="form-grupo"><label for="senha">Senha:</label><input type="password" id="senha" placeholder="Digite a senha"></div><button onclick="fazerLogin()">Entrar</button></div><script>var BACKEND_URL="https://cha-de-casa-nova-backend.vercel.app";var senhaAdmin="Naname2026!";var produtos=[];var doacoes=[];var metaTotal=0;function fazerLogin(){var entrada=document.getElementById("senha").value;if(entrada===senhaAdmin){document.body.classList.remove("nao-autenticado");document.body.classList.add("autenticado");localStorage.setItem("adminAutenticado","true");document.getElementById("login").style.display="none";criarPainelAdmin();carregarDadosFirebase();}else{alert("Senha incorreta!");}}function carregarDadosFirebase(){fetch(BACKEND_URL+"/api/produtos").then(r=>r.json()).then(resultado=>{if(resultado.success){produtos=resultado.data||[];calcularMeta();renderizarProdutos();}}).catch(err=>console.error("Erro ao carregar produtos:",err));fetch(BACKEND_URL+"/api/meta").then(r=>r.json()).then(resultado=>{if(resultado.success){metaTotal=resultado.meta;}}).catch(err=>console.error("Erro ao carregar meta:",err));}function criarPainelAdmin(){var html='<div class="header"><div style="display:flex;justify-content:space-between;align-items:center"><h1>Painel Admin - Cha de Casa Nova</h1><button class="btn btn-logout" onclick="sairAdmin()">Sair</button></div></div><div class="container"><div class="dashboard"><div class="card"><h3>Total Arrecadado</h3><div class="valor" id="total-arrecadado">R$ 0,00</div><div class="meta">Meta: R$ '+metaTotal.toFixed(2).replace(".",",")+'</div><div class="progress-bar"><div class="fill" id="progress-fill" style="width:0%"></div></div></div><div class="card"><h3>Percentual</h3><div class="valor" id="percentual">0%</div><div class="meta">de R$ '+metaTotal.toFixed(2).replace(".",",")+'</div></div><div class="card"><h3>Total de Doadores</h3><div class="valor" id="total-doadores">0</div><div class="meta">pessoas contribuindo</div></div></div><div class="section"><h2>Historico de Doacoes</h2><div style="overflow-x:auto"><table class="table"><thead><tr><th>Data</th><th>Doador</th><th>Email</th><th>Itens</th><th>Valor</th></tr></thead><tbody id="doacoes-tbody"></tbody></table></div></div><div class="section"><h2>Gerenciar Produtos</h2><div class="btn-group"><button class="btn btn-primary" onclick="abrirModalAddProduto()">Adicionar Produto</button></div><div style="overflow-x:auto"><table class="table"><thead><tr><th>Produto</th><th>Categoria</th><th>Preco</th><th>Acoes</th></tr></thead><tbody id="produtos-tbody"></tbody></table></div></div></div><div class="modal" id="modal-produto"><div class="modal-caixa"><h3 id="modal-titulo">Adicionar Produto</h3><div class="form-grupo"><label>Nome:</label><input type="text" id="prod-nome" placeholder="Nome do produto"></div><div class="form-grupo"><label>Categoria:</label><select id="prod-categoria" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px"><option>Eletronicos</option><option>Cozinha</option><option>Mesa</option><option>Limpeza</option><option>Texteis</option><option>Decoracao</option></select></div><div class="form-grupo"><label>Preco:</label><input type="number" id="prod-preco" placeholder="0.00" min="0" step="0.01"></div><button class="btn btn-primary" onclick="salvarProduto()">Salvar</button><button class="btn btn-secundario" onclick="fecharModal()">Cancelar</button></div></div>';document.body.innerHTML=html;}function calcularMeta(){metaTotal=0;produtos.forEach(function(p){metaTotal+=p.preco;});}function renderizarProdutos(){var tbody=document.getElementById("produtos-tbody");tbody.innerHTML="";produtos.forEach(function(p){var tr=document.createElement("tr");tr.innerHTML='<td>'+p.nome+'</td><td>'+p.cat+'</td><td>R$ '+p.preco.toFixed(2).replace(".",",")+'</td><td><button class="btn btn-secundario" onclick="editarProduto(\''+p.id+'\')">Editar</button> <button class="btn btn-danger" onclick="deletarProduto(\''+p.id+'\')">Deletar</button></td>';tbody.appendChild(tr);});}function abrirModalAddProduto(){document.getElementById("modal-titulo").textContent="Adicionar Produto";document.getElementById("prod-nome").value="";document.getElementById("prod-categoria").value="Eletronicos";document.getElementById("prod-preco").value="";document.getElementById("modal-produto").classList.add("ativo");document.getElementById("prod-nome").focus();}function editarProduto(id){var p=produtos.find(function(x){return x.id===id;});if(p){document.getElementById("modal-titulo").textContent="Editar Produto";document.getElementById("prod-nome").value=p.nome;document.getElementById("prod-categoria").value=p.cat;document.getElementById("prod-preco").value=p.preco;document.getElementById("prod-nome").dataset.editId=id;document.getElementById("modal-produto").classList.add("ativo");document.getElementById("prod-nome").focus();}}function deletarProduto(id){if(confirm("Tem certeza que deseja deletar este produto?")){fetch(BACKEND_URL+"/api/produtos",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"remove",id:id})}).then(r=>r.json()).then(resultado=>{if(resultado.success){produtos=produtos.filter(function(p){return p.id!==id;});calcularMeta();renderizarProdutos();alert("Produto deletado!");}}).catch(err=>alert("Erro ao deletar: "+err.message));}}function salvarProduto(){var nome=document.getElementById("prod-nome").value.trim();var cat=document.getElementById("prod-categoria").value;var preco=parseFloat(document.getElementById("prod-preco").value);if(!nome||!preco||preco<=0){alert("Preencha todos os campos corretamente!");return;}var editId=document.getElementById("prod-nome").dataset.editId;if(editId){fetch(BACKEND_URL+"/api/produtos",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"update",produto:{id:editId,nome:nome,cat:cat,preco:preco}})}).then(r=>r.json()).then(resultado=>{if(resultado.success){var p=produtos.find(function(x){return x.id===editId;});if(p){p.nome=nome;p.cat=cat;p.preco=preco;}calcularMeta();renderizarProdutos();fecharModal();alert("Produto atualizado!");}}).catch(err=>alert("Erro ao atualizar: "+err.message));}else{fetch(BACKEND_URL+"/api/produtos",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"add",produto:{nome:nome,cat:cat,preco:preco}})}).then(r=>r.json()).then(resultado=>{if(resultado.success){produtos.push({id:resultado.id,nome:nome,cat:cat,preco:preco});calcularMeta();renderizarProdutos();fecharModal();alert("Produto adicionado!");}}).catch(err=>alert("Erro ao adicionar: "+err.message));}}function fecharModal(){document.getElementById("modal-produto").classList.remove("ativo");document.getElementById("prod-nome").dataset.editId="";}function sairAdmin(){localStorage.removeItem("adminAutenticado");location.reload();}if(localStorage.getItem("adminAutenticado")){document.body.classList.remove("nao-autenticado");document.body.classList.add("autenticado");document.getElementById("login").style.display="none";criarPainelAdmin();carregarDadosFirebase();}document.getElementById("senha").addEventListener("keypress",function(e){if(e.key==="Enter")fazerLogin();});</script></body></html>
