<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chá de Casa Nova</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f7f1e3; padding: 20px; color: #333; }
.container { max-width: 1200px; margin: 0 auto; }
h1 { text-align: center; color: #8b4513; margin-bottom: 30px; }
#produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
.produto { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 2px solid #d2b48c; transition: transform 0.2s; }
.produto:hover { transform: translateY(-5px); }
.produto h3 { color: #8b4513; margin-bottom: 8px; }
.preco { font-size: 1.2rem; font-weight: bold; color: #2e8b57; margin-bottom: 10px; }
.cotas-info { font-size: 0.9rem; color: #555; margin-bottom: 8px; }
.barra-progresso { background: #e0e0e0; border-radius: 20px; height: 12px; overflow: hidden; margin-bottom: 10px; }
.barra-preenchida { height: 100%; background: #2e8b57; transition: width 0.3s; }
.input-group { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
.input-group label { font-size: 0.9rem; }
.input-group input { width: 80px; padding: 6px 8px; border: 2px solid #d2b48c; border-radius: 8px; font-size: 1rem; text-align: center; }
.total-reais { font-weight: bold; color: #8b4513; margin: 8px 0; }
.btn-add { background: #2e8b57; color: #fff; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 1rem; width: 100%; transition: background 0.2s; }
.btn-add:hover { background: #236b43; }
.btn-add:disabled { background: #aaa; cursor: not-allowed; }
.esgotado { opacity: 0.6; pointer-events: none; }
#carrinho { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 2px solid #d2b48c; margin-bottom: 30px; }
#carrinho h2 { color: #8b4513; margin-bottom: 15px; }
.item-carrinho { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
.item-carrinho:last-child { border-bottom: none; }
.item-info { flex: 1; }
.item-info span { display: block; }
.item-nome { font-weight: bold; }
.item-detalhes { font-size: 0.9rem; color: #555; }
.btn-remover { background: #c0392b; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
.btn-remover:hover { background: #a93226; }
#total-carrinho { font-size: 1.2rem; font-weight: bold; text-align: right; margin-top: 10px; color: #8b4513; }
#btn-finalizar { background: #8b4513; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; width: 100%; margin-top: 15px; transition: background 0.2s; }
#btn-finalizar:hover { background: #6f3610; }
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
.modal-overlay.ativo { display: flex; }
.modal { background: #fff; border-radius: 12px; padding: 30px; max-width: 500px; width: 90%; box-shadow: 0 10px 20px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
.modal h2 { color: #8b4513; margin-bottom: 20px; }
.modal p { margin: 10px 0; }
.pix-info { background: #f9f9f9; padding: 15px; border-radius: 8px; margin: 15px 0; line-height: 1.6; }
.btn-copiar, .btn-confirmar, .btn-enviar { background: #2e8b57; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-top: 10px; transition: background 0.2s; }
.btn-copiar:hover, .btn-confirmar:hover, .btn-enviar:hover { background: #236b43; }
.btn-fechar { background: #c0392b; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; float: right; font-size: 0.9rem; }
.form-cadastro { margin-top: 20px; }
.form-cadastro input { width: 100%; padding: 10px; margin: 8px 0; border: 2px solid #d2b48c; border-radius: 8px; font-size: 1rem; }
.form-cadastro label { font-weight: bold; }
.erro { color: red; font-size: 0.9rem; }
</style>
</head>
<body>
<div class="container">
<h1>Chá de Casa Nova</h1>
<div id="produtos"></div>
<div id="carrinho">
<h2>Carrinho</h2>
<div id="itens-carrinho"></div>
<div id="total-carrinho">Total: R$ 0,00</div>
<button id="btn-finalizar">Finalizar Doação</button>
</div>
</div>

<!-- Modal PIX -->
<div class="modal-overlay" id="modal-pix">
<div class="modal">
<button class="btn-fechar" onclick="fecharModalPix()">X</button>
<h2>Doação via PIX</h2>
<div class="pix-info">
<p><strong>PIX Estático</strong></p>
<p>Nome: Clarice Moreira Pinheiro</p>
<p>Chave: 21 99530-9311</p>
<p id="valor-pix-modal">Valor: R$ 0,00</p>
</div>
<button class="btn-copiar" onclick="copiarPix()">Copiar PIX</button>
<button class="btn-confirmar" onclick="mostrarFormConfirmacao()">Confirmar Pagamento</button>
</div>
</div>

<!-- Modal Formulário de Confirmação -->
<div class="modal-overlay" id="modal-form">
<div class="modal">
<button class="btn-fechar" onclick="fecharModalForm()">X</button>
<h2>Confirmar Doação</h2>
<div class="form-cadastro">
<label for="nome-doador">Nome Completo: <span class="erro" id="erro-nome"></span></label>
<input type="text" id="nome-doador" placeholder="Seu nome" required>
<label for="email-doador">Email: <span class="erro" id="erro-email"></span></label>
<input type="email" id="email-doador" placeholder="seu@email.com" required>
<button class="btn-enviar" onclick="enviarDoacao()">Enviar Doação</button>
</div>
</div>
</div>

<script>
// === Estado global ===
const state = {
  produtos: [],
  carrinho: JSON.parse(localStorage.getItem('carrinho') || '[]')
};

const PRODUTOS_URL = 'https://cha-de-casa-nova-backend.vercel.app/api/produtos';
const STATUS_URL = 'https://cha-de-casa-nova-backend.vercel.app/api/produtos-status';
const DOACAO_URL = 'https://cha-de-casa-nova-backend.vercel.app/api/doacao';

// === Inicialização ===
document.addEventListener('DOMContentLoaded', () => {
  carregarDados();
});

async function carregarDados() {
  try {
    const [resProdutos, resStatus] = await Promise.all([
      fetch(PRODUTOS_URL),
      fetch(STATUS_URL)
    ]);
    const dataProdutos = await resProdutos.json();
    const dataStatus = await resStatus.json();

    // Converte objeto Firebase em array
    const produtosArray = Object.values(dataProdutos);
    const statusMap = {};
    if (dataStatus && typeof dataStatus === 'object') {
      Object.keys(dataStatus).forEach(key => {
        const item = dataStatus[key];
        statusMap[item.nome || key] = item.status;
      });
    }

    state.produtos = produtosArray.map(prod => ({
      ...prod,
      status: statusMap[prod.nome] || 'disponivel'
    }));

    renderizarProdutos();
    renderizarCarrinho();
  } catch (error) {
    console.error('Erro ao carregar dados:', error);
  }
}

function renderizarProdutos() {
  const container = document.getElementById('produtos');
  container.innerHTML = '';

  state.produtos.forEach((prod, index) => {
    const disponivel = prod.status !== 'esgotado';
    const restantes = (prod.cotas_totais || 0) - (prod.cotas_vendidas || 0);
    const porcentagemVendida = prod.cotas_totais > 0 ? ((prod.cotas_vendidas / prod.cotas_totais) * 100) : 0;

    const div = document.createElement('div');
    div.className = `produto ${disponivel ? '' : 'esgotado'}`;
    div.innerHTML = `
      <h3>${prod.nome}</h3>
      <p class="preco">R$ ${(prod.preco || 0).toFixed(2)}</p>
      <p class="cotas-info">Cotas: ${prod.cotas_vendidas || 0} / ${prod.cotas_totais || 0} vendidas</p>
      <div class="barra-progresso">
        <div class="barra-preenchida" style="width: ${porcentagemVendida}%;"></div>
      </div>
      <div class="input-group">
        <label>Quantidade:</label>
        <input type="number" id="qtd-${index}" value="0" min="0" max="${restantes}" ${disponivel ? '' : 'disabled'}>
      </div>
      <p class="total-reais" id="total-reais-${index}">Total: R$ 0,00</p>
      <button class="btn-add" id="btn-add-${index}" ${disponivel ? '' : 'disabled'}>Adicionar ao Carrinho</button>
    `;

    container.appendChild(div);

    // Eventos
    const inputQtd = document.getElementById(`qtd-${index}`);
    const totalReais = document.getElementById(`total-reais-${index}`);
    const btnAdd = document.getElementById(`btn-add-${index}`);

    inputQtd.addEventListener('input', () => {
      const qtd = parseInt(inputQtd.value) || 0;
      totalReais.textContent = `Total: R$ ${(qtd * 10).toFixed(2)}`;
      btnAdd.disabled = (qtd <= 0 || !disponivel);
    });

    btnAdd.addEventListener('click', () => {
      const qtd = parseInt(inputQtd.value);
      if (qtd > 0 && disponivel) {
        adicionarAoCarrinho(prod, qtd);
        inputQtd.value = 0;
        totalReais.textContent = 'Total: R$ 0,00';
        btnAdd.disabled = true;
      }
    });

    // Disable add button initially if input 0
    btnAdd.disabled = true;
  });
}

function adicionarAoCarrinho(prod, qtd) {
  const existente = state.carrinho.find(item => item.nome === prod.nome);
  if (existente) {
    existente.quantidade_cotas += qtd;
  } else {
    state.carrinho.push({
      nome: prod.nome,
      quantidade_cotas: qtd,
      valor: prod.preco || 10
    });
  }
  localStorage.setItem('carrinho', JSON.stringify(state.carrinho));
  renderizarCarrinho();
}

function renderizarCarrinho() {
  const container = document.getElementById('itens-carrinho');
  container.innerHTML = '';
  let total = 0;

  state.carrinho.forEach((item, index) => {
    const valorItem = item.quantidade_cotas * 10;
    total += valorItem;

    const div = document.createElement('div');
    div.className = 'item-carrinho';
    div.innerHTML = `
      <div class="item-info">
        <span class="item-nome">${item.nome}</span>
        <span class="item-detalhes">${item.quantidade_cotas} cotas - R$ ${valorItem.toFixed(2)}</span>
      </div>
      <button class="btn-remover" onclick="removerDoCarrinho(${index})">Remover</button>
    `;
    container.appendChild(div);
  });

  document.getElementById('total-carrinho').textContent = `Total: R$ ${total.toFixed(2)}`;
  const btnFinalizar = document.getElementById('btn-finalizar');
  if (state.carrinho.length === 0) {
    btnFinalizar.style.display = 'none';
  } else {
    btnFinalizar.style.display = 'block';
  }
}

function removerDoCarrinho(index) {
  state.carrinho.splice(index, 1);
  localStorage.setItem('carrinho', JSON.stringify(state.carrinho));
  renderizarCarrinho();
}

// === Modal PIX ===
document.getElementById('btn-finalizar').addEventListener('click', () => {
  const total = state.carrinho.reduce((acc, item) => acc + item.quantidade_cotas * 10, 0);
  document.getElementById('valor-pix-modal').textContent = `Valor: R$ ${total.toFixed(2)}`;
  document.getElementById('modal-pix').classList.add('ativo');
});

function fecharModalPix() {
  document.getElementById('modal-pix').classList.remove('ativo');
}

function copiarPix() {
  const texto = 'Chave PIX: 21 99530-9311\nNome: Clarice Moreira Pinheiro';
  navigator.clipboard.writeText(texto).then(() => {
    alert('Chave PIX copiada!');
  }).catch(() => {
    alert('Erro ao copiar. Copie manualmente.');
  });
}

function mostrarFormConfirmacao() {
  document.getElementById('modal-pix').classList.remove('ativo');
  // Reset previous errors
  document.getElementById('erro-nome').textContent = '';
  document.getElementById('erro-email').textContent = '';
  document.getElementById('modal-form').classList.add('ativo');
}

function fecharModalForm() {
  document.getElementById('modal-form').classList.remove('ativo');
}

async function enviarDoacao() {
  const nome = document.getElementById('nome-doador').value.trim();
  const email = document.getElementById('email-doador').value.trim();

  let valid = true;
  if (!nome) {
    document.getElementById('erro-nome').textContent = 'Campo obrigatório';
    valid = false;
  } else {
    document.getElementById('erro-nome').textContent = '';
  }
  if (!email) {
    document.getElementById('erro-email').textContent = 'Campo obrigatório';
    valid = false;
  } else {
    document.getElementById('erro-email').textContent = '';
  }
  if (!valid) return;

  const dados = {
    nome,
    email,
    itens: state.carrinho.map(item => ({
      nome: item.nome,
      quantidade_cotas: item.quantidade_cotas,
      valor: 10
    }))
  };

  try {
    const response = await fetch(DOACAO_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(dados)
    });
    if (response.ok) {
      alert('Doação enviada com sucesso!');
      state.carrinho = [];
      localStorage.removeItem('carrinho');
      renderizarCarrinho();
      fecharModalForm();
    } else {
      const err = await response.json();
      alert('Erro ao enviar: ' + (err.message || 'Erro desconhecido'));
    }
  } catch (error) {
    alert('Erro de conexão. Tente novamente.');
  }
}
</script>
</body>
</html>
