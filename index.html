<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chá de Casa Nova - Doações</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #5a3e2b;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #8b6f47;
            margin-bottom: 30px;
        }
        .meta-bar {
            background: #f0e6d3;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        .meta-bar h2 {
            color: #4a2c1a;
            margin-bottom: 10px;
        }
        .progress-container {
            background: #ddd;
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #66bb6a, #43a047);
            width: 0%;
            transition: width 0.5s ease;
        }
        .meta-values {
            display: flex;
            justify-content: space-around;
            font-size: 1.1em;
            color: #3e2723;
            margin-top: 10px;
        }
        .produtos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .produto-card {
            background: #fff8f0;
            border: 1px solid #e0d0c0;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .produto-card:hover {
            transform: translateY(-5px);
        }
        .produto-card h3 {
            color: #5a3e2b;
            margin-bottom: 10px;
        }
        .produto-card .preco {
            font-size: 1.3em;
            color: #2e7d32;
            margin: 10px 0;
        }
        .btn-add {
            background: #8d6e63;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        .btn-add:hover {
            background: #6d4c41;
        }
        .carrinho-section {
            background: #f9f3ec;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .carrinho-section h2 {
            color: #4a2c1a;
            margin-bottom: 15px;
        }
        .carrinho-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e0d0c0;
        }
        .carrinho-item:last-child {
            border-bottom: none;
        }
        .carrinho-item button {
            background: #e57373;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 50%;
            cursor: pointer;
        }
        .carrinho-total {
            text-align: right;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 15px;
            color: #2e7d32;
        }
        .formulario {
            background: #fff8f0;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .formulario h2 {
            color: #4a2c1a;
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #5a3e2b;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d7ccc8;
            border-radius: 8px;
            font-size: 1em;
        }
        .btn-submit {
            background: #43a047;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        .btn-submit:hover {
            background: #2e7d32;
        }
        .error-msg {
            color: #c62828;
            text-align: center;
            margin-top: 10px;
        }
        .success-msg {
            color: #2e7d32;
            text-align: center;
            margin-top: 10px;
        }
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Chá de Casa Nova 🏡</h1>
        <p class="subtitle">Ajude a realizar nosso sonho! Escolha um presente e faça sua doação.</p>

        <div class="meta-bar">
            <h2>Meta de Arrecadação</h2>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="meta-values">
                <span>Arrecadado: <strong id="arrecadado">R$ 0,00</strong></span>
                <span>Meta: <strong id="metaValor">R$ 0,00</strong></span>
            </div>
        </div>

        <h2 style="color:#5a3e2b; margin-bottom:15px;">Produtos Disponíveis</h2>
        <div class="produtos-grid" id="produtosGrid">
            <!-- Produtos serão inseridos via JS -->
        </div>

        <div class="carrinho-section">
            <h2>🛒 Seu Carrinho</h2>
            <div id="carrinhoItens">
                <p id="carrinhoVazio">Nenhum item adicionado.</p>
            </div>
            <div class="carrinho-total">
                Total: <span id="carrinhoTotal">R$ 0,00</span>
            </div>
        </div>

        <div class="formulario">
            <h2>💌 Finalizar Doação</h2>
            <form id="formDoacao">
                <div class="form-group">
                    <label for="nome">Seu Nome</label>
                    <input type="text" id="nome" placeholder="Digite seu nome" required>
                </div>
                <div class="form-group">
                    <label for="email">Seu E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <button type="submit" class="btn-submit">Enviar Doação</button>
                <div id="mensagemRetorno"></div>
            </form>
        </div>
    </div>

    <script>
        // ========== Estado global ==========
        let produtos = [];
        let meta = { valor: 0 };
        let carrinho = [];

        // ========== Carregar dados do localStorage ==========
        function carregarDadosLocal() {
            try {
                const produtosSalvos = localStorage.getItem('produtos');
                if (produtosSalvos) produtos = JSON.parse(produtosSalvos);
                const metaSalva = localStorage.getItem('meta');
                if (metaSalva) meta = JSON.parse(metaSalva);
                const carrinhoSalvo = localStorage.getItem('carrinho');
                if (carrinhoSalvo) carrinho = JSON.parse(carrinhoSalvo);
            } catch (e) {
                console.error('Erro ao carregar dados do localStorage:', e);
            }
        }

        // ========== Salvar dados no localStorage ==========
        function salvarDadosLocal() {
            try {
                if (produtos.length) localStorage.setItem('produtos', JSON.stringify(produtos));
                if (meta.valor) localStorage.setItem('meta', JSON.stringify(meta));
                localStorage.setItem('carrinho', JSON.stringify(carrinho));
            } catch (e) {
                console.error('Erro ao salvar dados no localStorage:', e);
            }
        }

        // ========== Carregar produtos da API ==========
        async function carregarProdutos() {
            try {
                const response = await fetch('https://cha-de-casa-nova-backend.vercel.app/api/produtos');
                if (!response.ok) throw new Error('Erro na requisição: ' + response.status);
                const data = await response.json();
                // Converte objeto Firebase em array usando Object.values
                produtos = Object.values(data);
                salvarDadosLocal();
                renderizarProdutos();
            } catch (error) {
                console.error('Erro ao carregar produtos:', error);
                // Se falhar, tenta usar dados do localStorage
                if (produtos.length === 0) {
                    document.getElementById('produtosGrid').innerHTML = '<p>Não foi possível carregar os produtos. Tente novamente mais tarde.</p>';
                } else {
                    renderizarProdutos();
                }
            }
        }

        // ========== Carregar meta da API ==========
        async function carregarMeta() {
            try {
                const response = await fetch('https://cha-de-casa-nova-backend.vercel.app/api/meta');
                if (!response.ok) throw new Error('Erro na requisição: ' + response.status);
                const data = await response.json();
                meta = data;
                salvarDadosLocal();
                atualizarMetaUI();
            } catch (error) {
                console.error('Erro ao carregar meta:', error);
                if (meta.valor) {
                    atualizarMetaUI();
                }
            }
        }

        // ========== Atualizar interface da meta ==========
        function atualizarMetaUI() {
            const metaValorElement = document.getElementById('metaValor');
            const arrecadadoElement = document.getElementById('arrecadado');
            const progressBar = document.getElementById('progressBar');

            const metaValor = meta.valor || 0;
            const arrecadado = meta.arrecadado || 0;

            metaValorElement.textContent = `R$ ${metaValor.toFixed(2).replace('.', ',')}`;
            arrecadadoElement.textContent = `R$ ${arrecadado.toFixed(2).replace('.', ',')}`;

            const percentual = metaValor > 0 ? Math.min((arrecadado / metaValor) * 100, 100) : 0;
            progressBar.style.width = percentual + '%';
        }

        // ========== Renderizar produtos ==========
        function renderizarProdutos() {
            const grid = document.getElementById('produtosGrid');
            grid.innerHTML = '';

            if (!produtos || produtos.length === 0) {
                grid.innerHTML = '<p>Nenhum produto disponível no momento.</p>';
                return;
            }

            produtos.forEach((produto, index) => {
                const nome = produto.nome || produto.name || 'Produto sem nome';
                const preco = produto.preco || produto.price || 0;
                const descricao = produto.descricao || produto.description || '';

                const card = document.createElement('div');
                card.className = 'produto-card';
                card.innerHTML = `
                    <h3>${nome}</h3>
                    ${descricao ? `<p>${descricao}</p>` : ''}
                    <p class="preco">R$ ${preco.toFixed(2).replace('.', ',')}</p>
                    <button class="btn-add" data-index="${index}">Adicionar ao Carrinho</button>
                `;
                grid.appendChild(card);
            });

            // Adiciona event listeners aos botões de adicionar
            document.querySelectorAll('.btn-add').forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    adicionarAoCarrinho(index);
                });
            });
        }

        // ========== Gerenciar carrinho ==========
        function adicionarAoCarrinho(index) {
            const produto = produtos[index];
            if (!produto) return;

            // Verifica se já existe no carrinho
            const existente = carrinho.find(item => item.id === produto.id || item.nome === produto.nome);
            if (existente) {
                existente.quantidade += 1;
            } else {
                carrinho.push({
                    id: produto.id,
                    nome: produto.nome || produto.name,
                    preco: produto.preco || produto.price,
                    quantidade: 1
                });
            }
            salvarDadosLocal();
            renderizarCarrinho();
        }

        function removerDoCarrinho(index) {
            carrinho.splice(index, 1);
            salvarDadosLocal();
            renderizarCarrinho();
        }

        function renderizarCarrinho() {
            const container = document.getElementById('carrinhoItens');
            const vazio = document.getElementById('carrinhoVazio');
            const totalElement = document.getElementById('carrinhoTotal');

            container.innerHTML = '';

            if (carrinho.length === 0) {
                container.innerHTML = '<p id="carrinhoVazio">Nenhum item adicionado.</p>';
                totalElement.textContent = 'R$ 0,00';
                return;
            }

            let total = 0;
            carrinho.forEach((item, index) => {
                const subtotal = item.preco * item.quantidade;
                total += subtotal;

                const div = document.createElement('div');
                div.className = 'carrinho-item';
                div.innerHTML = `
                    <span>${item.nome} (x${item.quantidade})</span>
                    <span>R$ ${subtotal.toFixed(2).replace('.', ',')}</span>
                    <button onclick="removerDoCarrinho(${index})">×</button>
                `;
                container.appendChild(div);
            });

            totalElement.textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        // ========== Enviar doação ==========
        async function enviarDoacao(event) {
            event.preventDefault();

            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const mensagemRetorno = document.getElementById('mensagemRetorno');

            if (!nome || !email) {
                mensagemRetorno.innerHTML = '<p class="error-msg">Preencha todos os campos.</p>';
                return;
            }

            if (carrinho.length === 0) {
                mensagemRetorno.innerHTML = '<p class="error-msg">Adicione itens ao carrinho antes de doar.</p>';
                return;
            }

            const itens = carrinho.map(item => ({
                nome: item.nome,
                quantidade: item.quantidade,
                preco: item.preco
            }));

            const total = carrinho.reduce((acc, item) => acc + item.preco * item.quantidade, 0);
            const data = new Date().toISOString();

            const payload = {
                nome: nome,
                email: email,
                itens: itens,
                total: total,
                data: data
            };

            try {
                const response = await fetch('/api/doacao', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error('Erro no servidor: ' + response.status);
                }

                const result = await response.json();
                mensagemRetorno.innerHTML = '<p class="success-msg">Doação enviada com sucesso! Obrigado!</p>';
                // Limpar carrinho e formulário
                carrinho = [];
                salvarDadosLocal();
                renderizarCarrinho();
                document.getElementById('nome').value = '';
                document.getElementById('email').value = '';
            } catch (error) {
                console.error('Erro ao enviar doação:', error);
                mensagemRetorno.innerHTML = '<p class="error-msg">Erro ao enviar doação. Tente novamente mais tarde.</p>';
            }
        }

        // ========== Inicialização ==========
        document.addEventListener('DOMContentLoaded', function() {
            carregarDadosLocal();
            if (produtos.length) renderizarProdutos();
            if (meta.valor) atualizarMetaUI();
            renderizarCarrinho();

            // Carregar dados da API
            carregarProdutos();
            carregarMeta();

            document.getElementById('formDoacao').addEventListener('submit', enviarDoacao);
        });
    </script>
</body>
</html>
